<section class="gallery-section" dir="rtl">
  <div class="container-custom">
    <!-- Section Header -->
    <div class="gallery-header slide-down">
      <h2 class="gallery-title">معرض الصور</h2>
      <p class="gallery-subtitle">استكشف الحرم الجامعي والحياة الأكاديمية</p>
      <div class="gallery-divider"></div>
    </div>

    <!-- Slider -->
    <div class="gallery-slider" *ngIf="slides.length > 0">

      <!-- Prev Button -->
      <button
        class="slider-nav slider-prev"
        (click)="prevSlide()"
        [disabled]="isAnimating"
        aria-label="الشريحة السابقة">
        <i class="pi pi-chevron-right" aria-hidden="true"></i>
      </button>

      <!-- Slides Viewport -->
      <div class="slider-viewport">
        <div
          *ngFor="let slide of slides; let i = index"
          class="slide"
          [class.active]="i === currentSlide"
          [attr.aria-hidden]="i !== currentSlide">
          <div class="gallery-grid">
            <div
              *ngFor="let image of slide; let j = index"
              class="gallery-item"
              [style.animation-delay.ms]="j * 60"
              (click)="openLightbox(image)"
              tabindex="0"
              role="button"
              [attr.aria-label]="'عرض ' + image.fileName">
              <div class="image-container">
                <img
                  [src]="image.url"
                  [alt]="image.fileName"
                  class="gallery-image"
                  loading="lazy">
                <div class="image-overlay">
                  <div class="overlay-content">
                    <i class="pi pi-search-plus overlay-icon" aria-hidden="true"></i>
                    <span class="sr-only">عرض الصورة بملء الشاشة</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Next Button -->
      <button
        class="slider-nav slider-next"
        (click)="nextSlide()"
        [disabled]="isAnimating"
        aria-label="الشريحة التالية">
        <i class="pi pi-chevron-left" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Dot Indicators -->
    <div class="slider-dots" *ngIf="slides.length > 1" role="tablist" aria-label="شرائح المعرض">
      <button
        *ngFor="let slide of slides; let i = index"
        class="dot"
        [class.active]="i === currentSlide"
        (click)="goToSlide(i)"
        role="tab"
        [attr.aria-selected]="i === currentSlide"
        [attr.aria-label]="'الشريحة ' + (i + 1)">
      </button>
    </div>

    <!-- Slide Counter -->
    <p class="slide-counter" *ngIf="slides.length > 1">
      {{ currentSlide + 1 }} / {{ totalSlides }}
    </p>
  </div>

  <!-- Lightbox Modal -->
  <div
    class="lightbox-overlay"
    *ngIf="isLightboxOpen"
    [class.active]="isLightboxOpen"
    (click)="onLightboxBackgroundClick($event)">

    <div class="lightbox-container">
      <!-- Close Button -->
      <button
        class="lightbox-close"
        (click)="closeLightbox()"
        aria-label="إغلاق المعرض">
        <i class="pi pi-times" aria-hidden="true"></i>
      </button>

      <!-- Navigation Buttons -->
      <button
        class="lightbox-nav lightbox-prev"
        (click)="previousImage()"
        aria-label="الصورة السابقة">
        <i class="pi pi-chevron-right" aria-hidden="true"></i>
      </button>

      <button
        class="lightbox-nav lightbox-next"
        (click)="nextImage()"
        aria-label="الصورة التالية">
        <i class="pi pi-chevron-left" aria-hidden="true"></i>
      </button>

      <!-- Image -->
      <div class="lightbox-image-container" *ngIf="selectedImage">
        <img
          [src]="selectedImage.url"
          [alt]="selectedImage.fileName"
          class="lightbox-image">
      </div>
    </div>
  </div>
</section>
