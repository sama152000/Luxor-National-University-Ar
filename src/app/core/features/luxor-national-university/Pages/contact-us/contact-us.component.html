<div class="contact-us-page" dir="rtl">
  <section class="contact-hero-section">
    <div class="container-custom">
      <div class="contact-card fade-in">
        <!-- University Logo -->
        <div class="logo-section">
          <div class="logo-box hover-lift">
            <img [src]="logo" 
                 alt="جامعة الأقصر الأهلية" 
                 class="logo-img">
          </div>
        </div>

        <!-- University Name -->
        <h2 class="contact-title">معلومات التواصل</h2>

        <!-- Main Content Grid -->
        <div class="contact-content">
          <!-- Contact Info Section -->
          <div class="contact-info-section">
            <div class="contact-details">
              <!-- Phone Numbers -->
              <div class="phone-section">
                <h3 class="section-subtitle">التواصل</h3>
                <div class="contact-list">
                  <div class="contact-item slide-right">
                    <!-- <i class="pi pi-phone"></i> -->
                    <a class="contact-phone" [href]="'https://wa.me/'  + contacts[0]?.phone" target="_blank" rel="noopener noreferrer">
                      {{ contacts[0]?.phone }}
                    </a>
                  </div>
                  <div class="contact-item slide-right animate-delay-2">
                    <!-- <i class="pi pi-whatsapp"></i> -->
                    <a class="contact-phone" [href]="'https://wa.me/' + contacts[0]?.whatsApp" target="_blank" rel="noopener noreferrer">
                      {{ contacts[0]?.whatsApp }}
                    </a>
                  </div>
                  <div class="contact-item slide-right animate-delay-3">
                    <!-- <i class="pi pi-youtube"></i> -->
                    <a class="contact-phone" [href]="'https://wa.me/' +contacts[0]?.youTube" target="_blank" rel="noopener noreferrer">
                      {{ contacts[0]?.youTube }}
                    </a>
                  </div>
                  <div class="contact-item slide-right animate-delay-4">
                    <!-- <i class="pi pi-linkedin"></i> -->
                    <a class="contact-phone" [href]="'https://wa.me/' +contacts[0]?.linkedIn" target="_blank" rel="noopener noreferrer">
                      {{ contacts[0]?.linkedIn }}
                    </a>
                  </div>
                </div>
              </div>

              <!-- Email Section -->
              <div class="email-section slide-right animate-delay-5">
                <h3 class="section-subtitle">البريد الإلكتروني</h3>
                <div class="email-item">
                  <i class="pi pi-envelope email-icon"></i>
                  <a class="email-text" [href]="'mailto:' + contacts[0]?.email">{{ contacts[0]?.email }}</a>
                </div>
             
              </div>
              
            </div>
               <h3 class="section-subtitle mt-3">العنوان</h3>
                <div class="email-item">
                  <i class="pi pi-map-marker email-icon"></i>
                  <a class="email-text"
                     href="https://maps.app.goo.gl/uY3bVKkkBdkJ8EHVA"
                     target="_blank"
                     rel="noopener noreferrer">
                    {{ contacts[0]?.address }}
                  </a>
                </div>
                <!-- <div class="map-container mt-3">
                  <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3593.0258622713013!2d32.8040167!3d25.769709300000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14491592597f70b1%3A0xccac387a294f12e5!2z2KzYp9mF2LnYqSDYp9mE2KPZgti12LE!5e0!3m2!1sar!2seg!4v1780537312748!5m2!1sar!2seg"
                    width="100%"
                    height="300"
                    style="border:0; border-radius: 12px;"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                  </iframe>
                </div> -->
          </div>
          

          <!-- Illustration Section -->
          <div class="illustration-section">
            <div class="illustration-container slide-left">
              <div class="person-illustration">
                <div class="person-avatar">
                  <i class="pi pi-user"></i>
                </div>
                <div class="communication-icons">
                  <div class="icon-bubble phone-bubble">
                    <i class="pi pi-phone"></i>
                  </div>
                  <div class="icon-bubble message-bubble">
                    <i class="pi pi-comments"></i>
                  </div>
                  <div class="icon-bubble email-bubble">
                    <i class="pi pi-envelope"></i>
                  </div>
                </div>
                <div class="laptop-illustration">
                  <div class="laptop-screen"></div>
                  <div class="laptop-keyboard"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
